# vim: ft=tmux

SEP_ROUND_LEFT="\ue0b6"  # 
SEP_ROUND_RIGHT="\ue0b4"  # 
SEP_POWERLINE_RIGHT="\ue0ba"  # 
SEP_POWERLINE_LEFT="\ue0b8"  # 
ICON_CPU="\U000f035b"  # 󰍛
ICON_MEM="\uefc5"  # 
ICON_DISK="\U000f02ca"  # 󰋊
ICON_SWAP="\U000f0fb5"  # 󰾵
ICON_PING="\uebcb"  # 
ICON_LOSS="\U000f015b"  # 󰅛

# Other color candidates:
# #1C08B5
# #1A0061
# #14056a
# #29195E
STATUS_BG_COLOR="#1A0061"
STATUS_DARK_FG_COLOR="#1F1F28"
STATUS_LIGHT_FG_COLOR="#DCD7BA"
# Other color candidates
# #D27E99
# #DA5A83
# #C95479
# #CD5A7E
# #F25477
# #D95C80
# #EC5C96
# #f0649f
# #E7518D
ACTIVE_TAB_BG_COLOR="#EC5C96"
ACTIVE_TAB_FG_COLOR="#071ECB"
# Other color candidates
# #323065
# #242846
# #2A2F57
INACTIVE_TAB_BG_COLOR="#2A2F57"
INACTIVE_TAB_FG_COLOR="#7E9CD8"

set -g status-position top
set -g status-style "bg=${STATUS_BG_COLOR},fg=${STATUS_LIGHT_FG_COLOR}"

set -g window-status-format "#[fg=${INACTIVE_TAB_BG_COLOR},bg=${STATUS_BG_COLOR}]${SEP_ROUND_LEFT}#[fg=${INACTIVE_TAB_FG_COLOR},bg=${INACTIVE_TAB_BG_COLOR}]#I:#W#{?#{>:#{window_panes},1},[#{window_panes}],}#[fg=${INACTIVE_TAB_BG_COLOR},bg=${STATUS_BG_COLOR}]${SEP_ROUND_RIGHT}"
set -g window-status-current-format "#[fg=${ACTIVE_TAB_BG_COLOR},bg=${STATUS_BG_COLOR}]${SEP_ROUND_LEFT}#[fg=${ACTIVE_TAB_FG_COLOR},bg=${ACTIVE_TAB_BG_COLOR}]#I:#W#{?#{>:#{window_panes},1},[#{window_panes}],}#[fg=${ACTIVE_TAB_BG_COLOR},bg=${STATUS_BG_COLOR}]${SEP_ROUND_RIGHT}"
set -g window-status-separator " "

# Status left: user@host | session name | positional index/total
#   #H = hostname, #S = session name (expanded before #() executes)
#   Index sorted by creation time to match choose-tree (prefix+s) order
USER_HOST_BG_COLOR="#957fb8"
SESSION_NAME_BG_COLOR="#68AD99"
SESSION_COUNT_BG_COLOR="#FFA066"
set -g status-left-length 64
set -g status-left '\
#[fg=#{STATUS_DARK_FG_COLOR},bg=#{USER_HOST_BG_COLOR}] #(whoami)@#H \
#[fg=#{SESSION_NAME_BG_COLOR},bg=#{USER_HOST_BG_COLOR}]#{SEP_POWERLINE_RIGHT}#[fg=#{STATUS_DARK_FG_COLOR},bg=#{SESSION_NAME_BG_COLOR}] \
#{?#{==:#{e|-:#($HOME/.config/tmux/scripts/session-idx.sh #S),1},#S},\
#S,\
#{e|-:#($HOME/.config/tmux/scripts/session-idx.sh #S),1}: #S} \
#[fg=#{SESSION_COUNT_BG_COLOR},bg=#{SESSION_NAME_BG_COLOR}]#{SEP_POWERLINE_RIGHT}#[fg=#{STATUS_DARK_FG_COLOR},bg=#{SESSION_COUNT_BG_COLOR}] \
#($HOME/.config/tmux/scripts/session-idx.sh #S)\
/#(tmux list-sessions | wc -l | tr -d " ") \
#[fg=#{STATUS_BG_COLOR},bg=#{SESSION_COUNT_BG_COLOR}]#{SEP_POWERLINE_RIGHT}#[bg=#{STATUS_BG_COLOR}] '

set -g status-right-length 180
# Status right: all metrics computed by a single #() call to status-right.sh.
# This replaces 10+ individual #() calls, reducing screen redraws from 10+
# per status-interval to just 1. The script also updates pane @variables.
# Colors and icons are defined in the script — keep in sync if changed.
# Metrics: battery, cpu, mem, swap, disk, net-speed, ping, packet-loss
set -g status-right '#($HOME/.config/tmux/scripts/status-right.sh #S)'
